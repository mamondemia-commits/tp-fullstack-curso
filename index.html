<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body>
  <header>
    <div class="logo-container">
      <img class="logo" src="assets/images/logo.png" alt="Logo">
       <h1>Character Counter</h1>
    </div>
    <div class="settings">
      <button class="settings-button">☼</button>
    </div>
  </header>
  <main>
    <section class="hero">
      <h2>Approx. reading time: &lt;1 minute</h2>
      <textarea id="inputText" placeholder="Enter your text here..."></textarea>
    </section>
    <section class="checkboxes">
      <label for="excludeSpaces">
         <input type="checkbox" id="excludeSpaces">
        Exclude Spaces
      </label>
      <label for="SetCharacterLimit">
         <input type="checkbox" id="setCharacterLimit"> Set Character Limit
      </label>
      <p>Approx. reading time: <1 minute</p>
    </section>
    <section class="results"> 
        <div class="card purple">
            <h3>278</h3>
            <p>Total Characters</p>
        </div>
        <div class="card orange">
          <h3>39</h3>
          <p>Word Count</p>
        </div>
        <div class="card red">
          <h3>04</h3>
          <p>Sentences Count</p>
        </div>
        <div class="card red"></div>
    </section>
    <section class="letter-density">
       <h3>Letter Density</h3>
       <div class="letters">
          <label for="letter-e">E:</label>
          <meter id="letter-e" min="0" max="100" value="40"> 40 (16.06%) </meter>
        
          <label for="letter-i">I:</label>
          <meter id="letter-i" min="0" max="100" value="29"> 29 (11.65%) </meter>

          <label for="letter-t">T:</label>
          <meter id="letter-t" min="0" max="100" value="28"> 28 (11.24%) </meter>
        
          <label for="letter-o">O:</label>
          <meter id="letter-o" min="0" max="100" value="22"> 22 (8.84%) </meter>

          <label for="letter-n">N:</label>
          <meter id="letter-n" min="0" max="100" value="21"> 21 (8.43%) </meter>
       </div>
        <button>See more &#9660;</button>
    </section> 
  </main>
</body>
</html>
