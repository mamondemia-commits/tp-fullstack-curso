<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body>
  <header>
    <div class="logo-container">
      <img class="logo" src="assets/images/logo.png" alt="Logo">
       <h1>Character Counter</h1>
    </div>
    <div class="settings">
      <button class="settings-button">☼</button>
    </div>
  </header>
  <main>
    <section class="hero">
      <h2>Analyze your text in real-time</h2>
      <textarea id="inputText" placeholder="Enter your text here..."></textarea>
    </section>
    <section class="checkboxes">
      <div class="checkbox-container">
       <label for="excludeSpaces">
         <input type="checkbox" id="excludeSpaces">
        Exclude Spaces
       </label>
       <label for="SetCharacterLimit">
         <input type="checkbox" id="setCharacterLimit"> Set Character Limit
       </label>
      </div>
      <p>Approx. reading time: &lt;1 minute</p>
    </section>
    <section class="results"> 
      <div class="card-purple">
            <span class="stat-number">278</span>
            <span class="stat-label">Total Characters</span>
      </div>
      <div class="card-orange">
          <span class="stat-number">39</span>
          <span class="stat-label">Word Count</span>
      </div>
      <div class="card-coral">
          <span class="stat-number">04</span>
          <span class="stat-label">Sentences Count</span>
      </div>
    </section>
    <section class="letter-density">
       <h3>Letter Density</h3>
       <div class="letters-container">
          <div class="letter-row">
            <label for="letter-name">E:</label>
            <meter id="letter-name" min="0" max="100" value="40"></meter>
            <span class="letter-percentage"> 40 (16.06%)</span>
          </div>
          <div class="letter-row">
            <label for="letter-name">I:</label>
            <meter id="letter-name" min="0" max="100" value="29"></meter>
            <span class="letter-percentage"> 29 (11.51%) </span>
          </div>
          <div class="letter-row">
           <label for="letter-t">T:</label>
           <meter id="letter-t" min="0" max="100" value="28"></meter>
           <span class="letter-percentage"> 28 (11.24%) </span>
          </div>
          <div class="letter-row">
            <label for="letter-o">O:</label>
            <meter id="letter-o" min="0" max="100" value="22"></meter>
            <span class="letter-percentage"> 22 (8.84%) </span>
          </div>
          <div class="letter-row">
           <label for="letter-n">N:</label>
           <meter id="letter-n" min="0" max="100" value="21"></meter>
           <span class="letter-percentage"> 21 (8.43%) </span>
          </div>
       </div>
        <button>See more &#9660;</button>
    </section> 
  </main>
</body>
</html>
